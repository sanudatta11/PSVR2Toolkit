# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: ReleaseCI

  # Directory for build artifacts
  ARTIFACTS_DIR: ${{github.workspace}}/artifacts

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:OutDir=${{env.ARTIFACTS_DIR}} ${{env.SOLUTION_FILE_PATH}}

    - name: Upload Driver Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: psvr2-toolkit-driver
        path: |
          ${{env.ARTIFACTS_DIR}}/driver_playstation_vr2.dll
          ${{env.ARTIFACTS_DIR}}/driver_playstation_vr2.pdb

    - name: Upload Companion App Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: psvr2-toolkit-app
        path: |
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.exe
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.pdb
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.IPC.dll
          ${{env.ARTIFACTS_DIR}}/Newtonsoft.Json.dll
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.exe.config

    - name: Upload Installation Scripts
      uses: actions/upload-artifact@v4
      with:
        name: psvr2-toolkit-scripts
        path: |
          scripts/driver-install.ps1
          scripts/driver-install-full.ps1
          scripts/driver-restore.ps1

    # Note: PSVR2EyeTrackingCalibration.exe should be built separately and included in releases
    # The calibration tool is located at j:\PSVR2EyeTrackingCalibration and requires OpenXR SDK
